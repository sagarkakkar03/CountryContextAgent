version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    networks:
      - country-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8080"
    environment:
      - API_URL=http://backend:8080/stream
    depends_on:
      - backend
    networks:
      - country-net

networks:
  country-net:
    driver: bridge